version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: kairos-db
    environment:
      POSTGRES_USER: kairos
      POSTGRES_PASSWORD: kairos
      POSTGRES_DB: kairos
    ports:
      - "5432:5432"
    volumes:
      - kairos-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos -d kairos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kairos-backend
    environment:
      DATABASE_URL: postgresql://kairos:kairos@db:5432/kairos?schema=public
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 4h
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kairos-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  directus:
    image: directus/directus:11
    container_name: kairos-directus
    ports:
      - "8055:8055"
    environment:
      KEY: "kairos-directus-key-change-me"
      SECRET: "kairos-directus-secret-change-me"
      ADMIN_EMAIL: admin@kairos.sn
      ADMIN_PASSWORD: kairos2026
      DB_CLIENT: pg
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: kairos
      DB_USER: kairos
      DB_PASSWORD: kairos
      PUBLIC_URL: http://localhost:8055
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:3000"
      WEBSOCKETS_ENABLED: "true"
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  kairos-db-data:
  directus-uploads:
  directus-extensions:
