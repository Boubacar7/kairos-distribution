<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kairos Distributions — Éditorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --cream: #fbf4ef; --cream-2: #f6ebe3; --cream-3: #f0e0d5;
  --rose-50: #fbe8e3; --rose-100: #f5d9d3; --rose-200: #edc5bd;
  --nude: #e8c4bc;
  --bordeaux: #6d1e3a; --bordeaux-dk: #521529; --bordeaux-lt: #8a2d4d;
  --ink: #1a1414; --ink-2: #3b2e2e;
  --muted: #7a6a6a; --muted-2: #a99999;
  --line: rgba(26,20,20,0.08); --line-2: rgba(26,20,20,0.14);
  --radius-sm: 12px; --radius-md: 18px; --radius-lg: 28px; --radius-xl: 40px; --radius-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(26,20,20,0.04), 0 2px 6px rgba(109,30,58,0.04);
  --shadow-md: 0 4px 14px rgba(109,30,58,0.08), 0 1px 3px rgba(26,20,20,0.05);
  --shadow-lg: 0 20px 60px rgba(109,30,58,0.14), 0 6px 20px rgba(26,20,20,0.06);
  --font-display: "Fraunces", Georgia, serif;
  --font-ui: "Inter", -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--font-ui);color:var(--ink);background:var(--cream);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
a{color:inherit;text-decoration:none}img{max-width:100%;display:block}
input,textarea,select{font-family:inherit;color:inherit}
.display{font-family:var(--font-display);font-weight:400;letter-spacing:-0.02em;line-height:1.02}
.mono{font-family:var(--font-mono);letter-spacing:0.02em}
.container{max-width:1280px;margin:0 auto;padding:0 48px}
@media (max-width:720px){.container{padding:0 20px}}

.ph{position:relative;overflow:hidden;border-radius:var(--radius-md);
  background:repeating-linear-gradient(135deg,var(--rose-100) 0 12px,var(--rose-50) 12px 24px)}
.ph-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:11px;color:var(--bordeaux);opacity:0.55;letter-spacing:0.05em}
.ph.tall{aspect-ratio:3/4}.ph.square{aspect-ratio:1/1}.ph.wide{aspect-ratio:4/3}
.ph.g1{background:linear-gradient(135deg,#f5d9d3 0%,#e8b8c8 50%,#d6a3b8 100%)}
.ph.g2{background:linear-gradient(160deg,#f7e6df 0%,#e8c4bc 60%,#c89b9b 100%)}
.ph.g3{background:linear-gradient(200deg,#f5d9d3 0%,#eab5a8 50%,#6d1e3a 110%)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;
  border-radius:var(--radius-pill);font-size:14px;font-weight:500;transition:transform .15s,background .15s}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--bordeaux);color:var(--cream)}
.btn-primary:hover{background:var(--bordeaux-dk)}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line-2)}
.btn-ghost:hover{background:var(--cream-2)}
.btn-sm{padding:9px 16px;font-size:13px}

.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-pill);
  font-size:12px;font-weight:500;background:var(--rose-100);color:var(--bordeaux)}
.chip.cream{background:var(--cream);color:var(--ink);border:1px solid var(--line)}
.chip.promo{background:var(--bordeaux);color:var(--cream)}

.row{display:flex}.col{display:flex;flex-direction:column}
.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}
.gap-16{gap:16px}.gap-20{gap:20px}.gap-24{gap:24px}.gap-32{gap:32px}.gap-48{gap:48px}
.center{align-items:center}.between{justify-content:space-between}.wrap{flex-wrap:wrap}
.text-muted{color:var(--muted)}.text-sm{font-size:13px}.text-xs{font-size:11px}
.kicker{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;font-weight:600;color:var(--bordeaux)}

/* Nav */
nav.nav{position:sticky;top:0;z-index:50;background:rgba(251,244,239,0.85);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:16px 0}

/* Hero */
.hero-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:64px;align-items:center;padding:56px 0 80px}
.hero-title{font-family:var(--font-display);font-size:clamp(52px,7vw,104px);font-weight:300;
  line-height:0.95;letter-spacing:-0.035em;margin:24px 0}
.summary-card{background:#fff;border-radius:28px;padding:32px;box-shadow:var(--shadow-md);border:1px solid var(--line)}

/* Cards */
.product-card{background:#fff;border-radius:var(--radius-lg);padding:14px;border:1px solid var(--line);
  cursor:pointer;transition:transform .2s,box-shadow .2s}
.product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.review-card{background:#fff;border-radius:var(--radius-lg);padding:28px;border:1px solid var(--line);position:relative}

/* Drawer */
.drawer-bg{position:fixed;inset:0;z-index:200;background:rgba(26,20,20,0.35);backdrop-filter:blur(4px)}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(460px,100vw);background:var(--cream);
  z-index:201;padding:32px;overflow-y:auto;animation:slidein .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column}
@keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}

/* Progress */
.progress-track{height:6px;background:var(--rose-50);border-radius:var(--radius-pill);overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--bordeaux-lt),var(--bordeaux));transition:width .6s}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;
  background:var(--ink);color:var(--cream);padding:12px 20px;border-radius:var(--radius-pill);
  font-size:13px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px}
.toast .dot{width:8px;height:8px;border-radius:50%;background:#89d39a}

/* Admin */
.admin-fab{position:fixed;right:20px;bottom:20px;z-index:500;background:var(--ink);color:var(--cream);
  padding:12px 18px;border-radius:var(--radius-pill);font-weight:600;font-size:13px;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px}
.admin-panel{position:fixed;top:0;right:0;bottom:0;width:min(480px,100vw);background:#fff;
  z-index:600;overflow-y:auto;box-shadow:-20px 0 60px rgba(0,0,0,0.15);padding:28px;
  animation:slidein .3s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column}
.admin-tab{flex:1;padding:10px 14px;border-radius:var(--radius-pill);font-size:12px;font-weight:500;
  background:transparent;color:var(--muted)}
.admin-tab.on{background:var(--ink);color:var(--cream)}
.input,.textarea,.select{padding:10px 14px;border:1px solid var(--line-2);border-radius:var(--radius-sm);
  background:var(--cream);outline:0;font-size:13px;width:100%;font-family:inherit}
.textarea{resize:vertical;min-height:80px}
.label-sm{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;color:var(--muted);margin-bottom:4px;display:block}

.editable{cursor:pointer;transition:outline .15s;outline:2px solid transparent;outline-offset:4px;border-radius:8px}
.admin-on .editable:hover{outline:2px dashed var(--bordeaux)}
.admin-on .editable::after{content:"";position:absolute;inset:0;pointer-events:none}
.admin-on .editable-img{cursor:pointer;position:relative}
.admin-on .editable-img::before{content:"✎ cliquer pour changer";position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;background:rgba(26,20,20,0.5);color:#fff;
  font-size:12px;font-weight:500;border-radius:inherit;opacity:0;transition:opacity .15s;z-index:2}
.admin-on .editable-img:hover::before{opacity:1}

.screen-enter{animation:se .4s cubic-bezier(.2,.8,.2,1)}
@keyframes se{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

footer.ftr{background:var(--ink);color:var(--cream);padding:60px 0 32px;margin-top:40px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ============ DATA ============
const DEFAULT_PRODUCTS = [
  { id:"glow-skin", name:"Glow Skin Crème", category:"Beauté", tagline:"Hydratation intense, éclat visible en 7 jours", price:24900, oldPrice:32000, description:"Soin quotidien enrichi en huile d'argan, acide hyaluronique et vitamine E.", size:"50ml", rating:4.9, reviews:312, badge:null, image:null, gradient:1 },
  { id:"trim-active", name:"Trim Active Plus", category:"Amincissant", tagline:"Programme silhouette 28 jours", price:18500, oldPrice:null, description:"Complexe drainant à base de plantes, formule non-stimulante.", size:"60 gélules", rating:4.7, reviews:198, badge:"Best-seller", image:null, gradient:2 },
  { id:"curve-up", name:"Curve Up Gel", category:"Postérieur", tagline:"Routine tonifiante et raffermissante", price:27500, oldPrice:null, description:"Gel tonifiant à la caféine végétale et beurre de karité.", size:"200ml", rating:4.8, reviews:156, badge:"Nouveau", image:null, gradient:3 },
  { id:"lip-glow", name:"Lip & Glow Set", category:"Promo", tagline:"Pack découverte lèvres + visage", price:15900, oldPrice:22000, description:"Baume lèvres teinté + huile visage illuminatrice.", size:"Pack 2 produits", rating:4.8, reviews:89, badge:"-28%", image:null, gradient:1 },
  { id:"velvet-body", name:"Velvet Body Milk", category:"Beauté", tagline:"Lait corps soyeux karité + coco", price:12900, oldPrice:null, description:"Lait corps ultra-nourrissant, parfum fleur de coton.", size:"250ml", rating:4.6, reviews:241, badge:null, image:null, gradient:2 },
  { id:"confidence-kit", name:"Confidence Kit", category:"Promo", tagline:"Rituel complet beauté + silhouette", price:54000, oldPrice:72000, description:"Coffret signature Kairos. 5 produits hero, livraison offerte.", size:"Coffret 5 produits", rating:5.0, reviews:42, badge:"Signature", image:null, gradient:3 },
];
const DEFAULT_REVIEWS = [
  { id:1, author:"Safi C.", city:"Ouagadougou", rating:5, title:"Un vrai coup de cœur", body:"Livraison rapide, emballage soigné et les produits tiennent leurs promesses. La crème Glow Skin est devenue mon indispensable.", product:"Glow Skin Crème", verified:true, date:"12 mars 2026" },
  { id:2, author:"Massara C.", city:"Paris", rating:5, title:"Résultats visibles", body:"Après 3 semaines de Trim Active, je vois une vraie différence. Le suivi client sur WhatsApp m'a aidée à tenir la routine.", product:"Trim Active Plus", verified:true, date:"28 février 2026" },
  { id:3, author:"Banfora Girl.", city:"Montréal", rating:4, title:"Bon rapport qualité/prix", body:"Le pack Lip & Glow est parfait pour découvrir la marque.", product:"Lip & Glow Set", verified:true, date:"15 mars 2026" },
  { id:4, author:"Kôkô Girl.", city:"Cotonou", rating:5, title:"Service impeccable", body:"Équipe réactive, réponse sous 10 minutes en Snap. Je recommande les yeux fermés.", product:"Confidence Kit", verified:true, date:"3 avril 2026" },
];
const DEFAULT_GALLERY = [null, null, null, null, null, null, null, null];

const RATES = { FCFA:{r:1,s:"FCFA"}, EUR:{r:1/656,s:"€"}, USD:{r:1/610,s:"$"} };
function price(fcfa, cur="FCFA"){
  const v = fcfa * RATES[cur].r;
  if (cur==="FCFA") return `${Math.round(v).toLocaleString("fr-FR").replace(/,/g," ")} FCFA`;
  if (cur==="EUR") return `${v.toFixed(2).replace(".",",")} €`;
  return `$${v.toFixed(2)}`;
}

// ============ STORAGE ============
const K = {
  PRODUCTS: "kairos_products_v2",
  REVIEWS: "kairos_reviews_v2",
  GALLERY: "kairos_gallery_v2",
  CART: "kairos_cart_v2",
};
function load(k, fallback){ try { return JSON.parse(localStorage.getItem(k)) ?? fallback; } catch { return fallback; } }
function save(k, v){ localStorage.setItem(k, JSON.stringify(v)); }

// ============ ICONS ============
const I = {
  Cart: (p) => <svg width={p.s||18} height={p.s||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 4h2l2.5 12h11L21 7H6"/><circle cx="9" cy="20" r="1.3"/><circle cx="17" cy="20" r="1.3"/></svg>,
  Arrow: (p) => <svg width={p.s||18} height={p.s||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>,
  Star: (p) => <svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill={p.f===false?"none":"currentColor"} stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"><path d="M12 3l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.8l-5.8 3.1 1.1-6.5L2.6 9.8l6.5-.9L12 3z"/></svg>,
  Check: (p) => <svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4L19 7"/></svg>,
  Plus: (p) => <svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  Minus: (p) => <svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M5 12h14"/></svg>,
  Close: (p) => <svg width={p.s||18} height={p.s||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>,
  Truck: (p) => <svg width={p.s||16} height={p.s||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7h11v10H3zM14 10h4l3 3v4h-7z"/><circle cx="7" cy="18" r="1.5"/><circle cx="17" cy="18" r="1.5"/></svg>,
  Edit: (p) => <svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>,
  Trash: (p) => <svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>,
};

function Rating({ value, size=12 }) {
  const full = Math.floor(value); const half = value - full >= 0.5;
  return <span style={{display:"inline-flex",gap:2,color:"var(--bordeaux)",alignItems:"center"}}>
    {[0,1,2,3,4].map(i => <I.Star key={i} f={i < full || (i === full && half)} s={size} />)}
  </span>;
}

function ProductImg({ product, className="", style={}, onClick, adminOn }) {
  const v = product.gradient===1?"g1":product.gradient===2?"g2":"g3";
  if (product.image) {
    return <div
      className={`ph ${className} ${adminOn?"editable-img":""}`}
      style={{...style,backgroundImage:`url(${product.image})`,backgroundSize:"cover",backgroundPosition:"center"}}
      onClick={onClick}
    />;
  }
  return <div className={`ph ${v} ${className} ${adminOn?"editable-img":""}`} style={style} onClick={onClick}>
    {!product.image && <span className="ph-label">{product.name}</span>}
  </div>;
}
function GalleryImg({ src, gradient, className="", style={}, onClick, adminOn, label }) {
  if (src) {
    return <div
      className={`ph ${className} ${adminOn?"editable-img":""}`}
      style={{...style,backgroundImage:`url(${src})`,backgroundSize:"cover",backgroundPosition:"center"}}
      onClick={onClick}
    />;
  }
  const v = gradient===3?"g3":gradient===2?"g2":"g1";
  return <div className={`ph ${v} ${className} ${adminOn?"editable-img":""}`} style={style} onClick={onClick}>
    {label && <span className="ph-label">{label}</span>}
  </div>;
}

// ============ APP ============
function App() {
  const [products, setProducts] = useState(() => load(K.PRODUCTS, DEFAULT_PRODUCTS));
  const [reviews, setReviews] = useState(() => load(K.REVIEWS, DEFAULT_REVIEWS));
  const [gallery, setGallery] = useState(() => load(K.GALLERY, DEFAULT_GALLERY));
  const [cart, setCart] = useState(() => load(K.CART, []));
  const [currency, setCurrency] = useState("FCFA");
  const [cartOpen, setCartOpen] = useState(false);
  const [adminOpen, setAdminOpen] = useState(false);
  const [adminOn, setAdminOn] = useState(false);
  const [adminTab, setAdminTab] = useState("products");
  const [editingProduct, setEditingProduct] = useState(null);
  const [editingReview, setEditingReview] = useState(null);
  const [editingGalleryIdx, setEditingGalleryIdx] = useState(null);
  const [toast, setToast] = useState(null);
  const [screen, setScreen] = useState("home");

  useEffect(()=>save(K.PRODUCTS, products), [products]);
  useEffect(()=>save(K.REVIEWS, reviews), [reviews]);
  useEffect(()=>save(K.GALLERY, gallery), [gallery]);
  useEffect(()=>save(K.CART, cart), [cart]);

  useEffect(()=>{
    document.body.classList.toggle("admin-on", adminOn);
  }, [adminOn]);

  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(null), 2400); };

  const addCart = (pid) => {
    setCart(prev => {
      const ex = prev.find(c=>c.id===pid);
      return ex ? prev.map(c=>c.id===pid?{...c,qty:c.qty+1}:c) : [...prev, {id:pid, qty:1}];
    });
    const p = products.find(x=>x.id===pid);
    showToast(`${p?.name} ajouté au panier`);
  };

  const cartCount = cart.reduce((s,i)=>s+i.qty, 0);

  // Click-to-edit helpers when admin is ON
  const onProductImgClick = (p) => adminOn && setEditingProduct(p);
  const onReviewClick = (r) => adminOn && setEditingReview(r);
  const onGalleryClick = (i) => adminOn && setEditingGalleryIdx(i);

  return (
    <div>
      <Nav
        cartCount={cartCount}
        onCart={()=>setCartOpen(true)}
        currency={currency} setCurrency={setCurrency}
        screen={screen} setScreen={setScreen}
      />

      {screen === "home" && <Home
        products={products}
        reviews={reviews}
        gallery={gallery}
        currency={currency}
        addCart={addCart}
        adminOn={adminOn}
        onProductImgClick={onProductImgClick}
        onReviewClick={onReviewClick}
        onGalleryClick={onGalleryClick}
        setScreen={setScreen}
      />}
      {screen === "catalog" && <Catalog
        products={products}
        currency={currency}
        addCart={addCart}
        adminOn={adminOn}
        onProductImgClick={onProductImgClick}
        setScreen={setScreen}
      />}
      {screen === "reviews" && <ReviewsPage
        reviews={reviews}
        gallery={gallery}
        adminOn={adminOn}
        onReviewClick={onReviewClick}
        onGalleryClick={onGalleryClick}
        onAddReview={() => setEditingReview({ id: Date.now(), author:"", city:"", rating:5, title:"", body:"", product:"", verified:true, date:new Date().toLocaleDateString("fr-FR") })}
      />}

      <Footer setScreen={setScreen} />

      {cartOpen && <CartDrawer
        cart={cart} setCart={setCart} products={products}
        currency={currency} onClose={()=>setCartOpen(false)}
        onCheckout={()=>{ setCartOpen(false); showToast("Commande envoyée · un conseiller vous contacte sur WhatsApp"); setCart([]); }}
      />}

      {/* Admin FAB */}
      <button className="admin-fab" onClick={()=>setAdminOpen(true)}>
        <I.Edit s={14}/> Admin
      </button>

      {adminOpen && <AdminPanel
        onClose={()=>setAdminOpen(false)}
        adminOn={adminOn} setAdminOn={setAdminOn}
        tab={adminTab} setTab={setAdminTab}
        products={products} setProducts={setProducts}
        reviews={reviews} setReviews={setReviews}
        gallery={gallery} setGallery={setGallery}
        onEditProduct={setEditingProduct}
        onEditReview={setEditingReview}
        onEditGallery={setEditingGalleryIdx}
      />}

      {editingProduct && <ProductEditor
        product={editingProduct}
        onClose={()=>setEditingProduct(null)}
        onSave={(p) => {
          setProducts(prev => prev.map(x => x.id === p.id ? p : x));
          setEditingProduct(null);
          showToast("Produit mis à jour");
        }}
      />}

      {editingReview && <ReviewEditor
        review={editingReview}
        onClose={()=>setEditingReview(null)}
        onSave={(r) => {
          setReviews(prev => prev.find(x=>x.id===r.id) ? prev.map(x=>x.id===r.id?r:x) : [r, ...prev]);
          setEditingReview(null);
          showToast("Avis enregistré");
        }}
        onDelete={(r) => {
          setReviews(prev => prev.filter(x=>x.id!==r.id));
          setEditingReview(null);
          showToast("Avis supprimé");
        }}
      />}

      {editingGalleryIdx !== null && <GalleryEditor
        idx={editingGalleryIdx}
        current={gallery[editingGalleryIdx]}
        onClose={()=>setEditingGalleryIdx(null)}
        onSave={(url) => {
          setGallery(prev => prev.map((g,i) => i === editingGalleryIdx ? url : g));
          setEditingGalleryIdx(null);
          showToast("Image mise à jour");
        }}
      />}

      {toast && <div className="toast"><span className="dot"/>{toast}</div>}
    </div>
  );
}

function CartDrawer({ cart, setCart, products, currency, onClose, onCheckout }) {
  const items = cart.map(c => ({ ...c, product: products.find(p=>p.id===c.id) })).filter(c=>c.product);
  const subtotal = items.reduce((s,i)=>s+i.product.price*i.qty, 0);
  const shipping = subtotal > 30000 || subtotal === 0 ? 0 : 2500;
  const total = subtotal + shipping;
  const upd = (id, qty) => qty<=0 ? setCart(cart.filter(c=>c.id!==id)) : setCart(cart.map(c=>c.id===id?{...c,qty}:c));
  return (
    <>
      <div className="drawer-bg" onClick={onClose}/>
      <aside className="drawer">
        <div className="row between center" style={{marginBottom:24}}>
          <div>
            <div className="kicker">Votre panier</div>
            <div className="display" style={{fontSize:28,marginTop:4}}>{items.length} {items.length>1?"articles":"article"}</div>
          </div>
          <button onClick={onClose} style={{width:40,height:40,borderRadius:"50%",background:"var(--cream-2)",
            display:"flex",alignItems:"center",justifyContent:"center"}}><I.Close/></button>
        </div>
        {items.length === 0 ? (
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,textAlign:"center"}}>
            <div style={{width:80,height:80,borderRadius:"50%",background:"var(--rose-50)",
              display:"flex",alignItems:"center",justifyContent:"center",color:"var(--bordeaux)"}}>
              <I.Cart s={30}/>
            </div>
            <div className="display" style={{fontSize:22}}>Panier vide</div>
            <button className="btn btn-primary" onClick={onClose}>Parcourir le catalogue</button>
          </div>
        ) : (
          <>
            <div className="col gap-16" style={{flex:1}}>
              {items.map(it => (
                <div key={it.id} style={{display:"flex",gap:14,padding:14,background:"#fff",borderRadius:"var(--radius-lg)",border:"1px solid var(--line)"}}>
                  <ProductImg product={it.product} style={{width:72,height:72,borderRadius:"var(--radius-sm)",flexShrink:0}}/>
                  <div className="col gap-6" style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:14}}>{it.product.name}</div>
                    <div className="text-muted text-xs">{it.product.size}</div>
                    <div className="row between center" style={{marginTop:4}}>
                      <div style={{display:"inline-flex",alignItems:"center",gap:2,background:"var(--cream-2)",borderRadius:"var(--radius-pill)",padding:3}}>
                        <button onClick={()=>upd(it.id, it.qty-1)} style={{width:26,height:26,borderRadius:"50%",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}><I.Minus/></button>
                        <span style={{minWidth:22,textAlign:"center",fontWeight:600,fontSize:13}}>{it.qty}</span>
                        <button onClick={()=>upd(it.id, it.qty+1)} style={{width:26,height:26,borderRadius:"50%",background:"var(--bordeaux)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}><I.Plus/></button>
                      </div>
                      <span style={{fontSize:13,fontWeight:600}}>{price(it.product.price*it.qty, currency)}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{marginTop:24,padding:20,background:"#fff",borderRadius:"var(--radius-lg)",border:"1px solid var(--line)"}}>
              <div className="row between" style={{fontSize:13,marginBottom:8}}>
                <span className="text-muted">Sous-total</span><span>{price(subtotal,currency)}</span>
              </div>
              <div className="row between" style={{fontSize:13,marginBottom:12}}>
                <span className="text-muted">Livraison</span><span>{shipping===0?"Offerte":price(shipping,currency)}</span>
              </div>
              <div style={{height:1,background:"var(--line)",margin:"12px 0"}}/>
              <div className="row between center">
                <span style={{fontSize:13,fontWeight:500}}>Total</span>
                <span className="display" style={{fontSize:24}}>{price(total,currency)}</span>
              </div>
              <button className="btn btn-primary" style={{width:"100%",marginTop:14}} onClick={onCheckout}>
                Passer commande <I.Arrow/>
              </button>
            </div>
          </>
        )}
      </aside>
    </>
  );
}

          <button className={`admin-tab ${tab==="reviews"?"on":""}`} onClick={()=>setTab("reviews")}>Avis · {reviews.length}</button>
          <button className={`admin-tab ${tab==="gallery"?"on":""}`} onClick={()=>setTab("gallery")}>Galerie · {gallery.length}</button>
        </div>

        {tab === "products" && (
          <div className="col gap-8" style={{flex:1,overflowY:"auto"}}>
            {products.map(p => (
              <div key={p.id} style={{display:"flex",gap:12,padding:12,background:"var(--cream)",
                borderRadius:"var(--radius-md)",border:"1px solid var(--line)",alignItems:"center"}}>
                <ProductImg product={p} style={{width:48,height:48,borderRadius:"var(--radius-sm)",flexShrink:0}}/>
                <div className="col gap-2" style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
                  <div className="text-xs text-muted">{p.category} · {price(p.price,"FCFA")}</div>
                </div>
                <button onClick={()=>onEditProduct(p)} className="btn btn-ghost btn-sm">Modifier</button>
              </div>
            ))}
          </div>
        )}

        {tab === "reviews" && (
          <div className="col gap-8" style={{flex:1,overflowY:"auto"}}>
            <button className="btn btn-primary btn-sm" onClick={()=>onEditReview({
              id:Date.now(), author:"", city:"", rating:5, title:"", body:"", product:"", verified:true,
              date:new Date().toLocaleDateString("fr-FR")
            })} style={{marginBottom:4}}>
              <I.Plus s={12}/> Nouvel avis
            </button>
            {reviews.map(r => (
              <div key={r.id} style={{padding:14,background:"var(--cream)",borderRadius:"var(--radius-md)",
                border:"1px solid var(--line)"}}>
                <div className="row between center" style={{marginBottom:4}}>
                  <div style={{fontSize:13,fontWeight:600}}>{r.author || "Anonyme"}</div>
                  <Rating value={r.rating} size={11}/>
                </div>
                <div className="text-xs text-muted" style={{marginBottom:8,display:"-webkit-box",
                  WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{r.body}</div>
                <div className="row gap-6">
                  <button onClick={()=>onEditReview(r)} className="btn btn-ghost btn-sm" style={{padding:"6px 12px"}}><I.Edit s={12}/> Modifier</button>
                  <button onClick={()=>{
                    if(confirm("Supprimer cet avis ?")) setReviews(reviews.filter(x=>x.id!==r.id));
                  }} className="btn btn-ghost btn-sm" style={{padding:"6px 12px",color:"var(--bordeaux)"}}><I.Trash s={12}/></button>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === "gallery" && (
          <div className="col gap-12" style={{flex:1,overflowY:"auto"}}>
            <div className="text-sm text-muted" style={{marginBottom:4}}>
              Cliquez sur une case pour ajouter ou changer l'image.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:10}}>
              {gallery.map((g, i) => (
                <button key={i} onClick={()=>onEditGallery(i)} style={{padding:0,border:"2px solid var(--line)",
                  borderRadius:"var(--radius-sm)",overflow:"hidden",cursor:"pointer",aspectRatio:"1/1",position:"relative"}}>
                  <GalleryImg src={g} gradient={(i%3)+1} className="square" style={{borderRadius:0,height:"100%"}} label={`#${i+1}`}/>
                </button>
              ))}
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setGallery([...gallery, null])}>
              <I.Plus s={12}/> Ajouter une case
            </button>
          </div>
        )}
      </aside>
    </>
  );
}

// ============ IMAGE INPUT helper ============
function ImageInput({ current, onChange, label="Image" }) {
  const fileRef = useRef(null);
  const [mode, setMode] = useState("upload"); // upload | url
  const [urlVal, setUrlVal] = useState(current && !current.startsWith("data:") ? current : "");
  const handleFile = (f) => {
    const reader = new FileReader();
    reader.onload = () => onChange(reader.result);
    reader.readAsDataURL(f);
  };
  return (
    <div>
      <span className="label-sm">{label}</span>
      <div style={{display:"flex",gap:4,background:"var(--cream-2)",borderRadius:"var(--radius-pill)",padding:3,marginBottom:10,width:"fit-content"}}>
        <button type="button" onClick={()=>setMode("upload")} style={{padding:"5px 12px",fontSize:11,fontWeight:600,borderRadius:999,background:mode==="upload"?"var(--bordeaux)":"transparent",color:mode==="upload"?"#fff":"var(--ink-2)"}}>Téléverser</button>
        <button type="button" onClick={()=>setMode("url")} style={{padding:"5px 12px",fontSize:11,fontWeight:600,borderRadius:999,background:mode==="url"?"var(--bordeaux)":"transparent",color:mode==="url"?"#fff":"var(--ink-2)"}}>URL</button>
      </div>
      {mode === "upload" ? (
        <div
          onClick={()=>fileRef.current?.click()}
          onDragOver={(e)=>{e.preventDefault()}}
          onDrop={(e)=>{e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) handleFile(f);}}
          style={{border:"2px dashed var(--line-2)",borderRadius:"var(--radius-md)",padding:20,textAlign:"center",cursor:"pointer",background:"var(--cream)"}}
        >
          {current ? (
            <div>
              <div style={{width:140,height:140,margin:"0 auto 10px",borderRadius:"var(--radius-sm)",
                backgroundImage:`url(${current})`,backgroundSize:"cover",backgroundPosition:"center"}}/>
              <div className="text-xs text-muted">Cliquer pour changer · glisser-déposer accepté</div>
            </div>
          ) : (
            <div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Déposer une image ici</div>
              <div className="text-xs text-muted">ou cliquer pour choisir un fichier</div>
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={(e)=>{
            const f=e.target.files?.[0]; if(f) handleFile(f);
          }}/>
        </div>
      ) : (
        <div className="col gap-8">
          <input className="input" placeholder="https://..." value={urlVal} onChange={(e)=>setUrlVal(e.target.value)}/>
          <div className="row gap-8">
            <button className="btn btn-ghost btn-sm" onClick={()=>onChange(urlVal)}>Appliquer l'URL</button>
            {current && <button className="btn btn-ghost btn-sm" onClick={()=>onChange(null)} style={{color:"var(--bordeaux)"}}>Retirer l'image</button>}
          </div>
          {current && <div style={{marginTop:6,width:140,height:140,borderRadius:"var(--radius-sm)",
            backgroundImage:`url(${current})`,backgroundSize:"cover",backgroundPosition:"center"}}/>}
        </div>
      )}
    </div>
  );
}

// ============ REVIEW EDITOR ============
function ReviewEditor({ review, onClose, onSave, onDelete }) {

  const isNew = !review.author && !review.body;
  return (
    <>
      <div className="drawer-bg" onClick={onClose} style={{zIndex:700}}/>
      <aside className="admin-panel" style={{zIndex:701,width:"min(480px,100vw)"}}>
        <div className="row between center" style={{marginBottom:20}}>
          <div>
            <div className="kicker">Avis client</div>
            <div className="display" style={{fontSize:22,marginTop:2}}>{isNew?"Nouvel avis":"Modifier l'avis"}</div>
          </div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:"50%",background:"var(--cream-2)",
            display:"flex",alignItems:"center",justifyContent:"center"}}><I.Close/></button>
        </div>
        <div className="col gap-14" style={{flex:1,overflowY:"auto"}}>
          <div className="row gap-10">
            <div style={{flex:1}}>
              <span className="label-sm">Nom</span>
              <input className="input" value={r.author} onChange={(e)=>upd("author", e.target.value)} placeholder="Safi C."/>
            </div>
            <div style={{flex:1}}>
              <span className="label-sm">Ville</span>
              <input className="input" value={r.city} onChange={(e)=>upd("city", e.target.value)} placeholder="Dakar"/>
            </div>
          </div>
          <div>
            <span className="label-sm">Note</span>
            <div className="row gap-6" style={{marginTop:4}}>
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={()=>upd("rating", n)} style={{
                  color:n<=r.rating?"var(--bordeaux)":"var(--line-2)",padding:4
                }}><I.Star f={true} s={22}/></button>
              ))}
              <span style={{fontSize:13,marginLeft:8,color:"var(--muted)"}}>{r.rating}/5</span>
            </div>
          </div>
          <div>
            <span className="label-sm">Titre</span>
            <input className="input" value={r.title} onChange={(e)=>upd("title", e.target.value)} placeholder="Un vrai coup de cœur"/>
          </div>
          <div>
            <span className="label-sm">Avis</span>
            <textarea className="textarea" value={r.body} onChange={(e)=>upd("body", e.target.value)} placeholder="Livraison rapide..."/>
          </div>
          <div className="row gap-10">
            <div style={{flex:1}}>
              <span className="label-sm">Produit concerné</span>
              <input className="input" value={r.product} onChange={(e)=>upd("product", e.target.value)}/>
            </div>
            <div style={{flex:1}}>
              <span className="label-sm">Date</span>
              <input className="input" value={r.date} onChange={(e)=>upd("date", e.target.value)}/>
            </div>
          </div>
          <label className="row gap-8 center" style={{fontSize:13,cursor:"pointer"}}>
            <input type="checkbox" checked={r.verified} onChange={(e)=>upd("verified", e.target.checked)}/>
            Achat vérifié
          </label>
        </div>
        <div className="row gap-10" style={{marginTop:20}}>
          {!isNew && <button className="btn btn-ghost" style={{color:"var(--bordeaux)"}} onClick={()=>{
            if(confirm("Supprimer cet avis ?")) onDelete(r);
          }}><I.Trash s={14}/> Supprimer</button>}
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Annuler</button>
          <button className="btn btn-primary" style={{flex:1}} onClick={()=>onSave(r)}>Enregistrer</button>
        </div>
      </aside>
    </>
  );
}
